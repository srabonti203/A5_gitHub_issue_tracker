<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>
    <!-- font awsome links -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- daisy ui + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Geist", sans-serif;
      }
      .active {
        background-color: rgb(8, 8, 155);
        color: white;
      }
    </style>
  </head>
  <body>
    <section class="container-box w-full mx-auto p-5 bg-base-200 space-y-5">
      <!-- navbar start -->
      <nav
        class="flex flex-col md:gap-4 items-center gap-6 md:justify-between md:flex-row md:p-2 p-4 bg-base-100 shadow-sm"
      >
        <div class="left-part flex items-center gap-3">
          <img class="w-10" src="./assets/github-logo.png" alt="" />
          <p class="font-bold text-2xl">GitHub Issue Tracker</p>
        </div>
        <div class="right-part">
          <label class="input">
            <svg
              id="searchBtn"
              class="h-[1em] opacity-50 cursor-pointer"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input
              id="searchInput"
              type="search"
              required
              placeholder="Search issues..."
            />
          </label>
        </div>
      </nav>

      <!-- buttons -->
      <section
        class="md:w-11/12 w-full mx-auto bg-base-100 p-3 space-x-3 px-4 md:space-x-5 text-left"
      >
        <button
          onclick="toggleStyle('all-btn')"
          id="all-btn"
          class="btn btn-primary md:w-20"
        >
          All
        </button>
        <button
          onclick="toggleStyle('open-btn')"
          id="open-btn"
          class="btn md:w-20"
        >
          Open
        </button>
        <button onclick="toggleStyle('closed-btn')" id="closed-btn" class="btn">
          Closed
        </button>
      </section>

      <!-- all count section  -->
      <section
        class="md:w-11/12 w-full mx-auto bg-base-100 p-4 flex flex-col gap-4 md:flex-row md:items-center md:justify-between border-b-1 border-gray-300"
      >
        <div class="flex items-center flex-initial gap-3">
          <div
            class="bg-blue-600/20 flex items-center justify-center md:w-12 md:h-12 rounded-full w-10 h-10"
          >
            <img src="./assets/Aperture.png" alt="" />
          </div>
          <div>
            <p class="font-bold"><span id="issue-count">50</span> Issues</p>
            <p>Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="bg-green-600 w-3 h-3 rounded-full"></div>
          <p>Open</p>
          <div class="bg-purple-600 w-3 h-3 rounded-full"></div>
          <p>Closed</p>
        </div>
      </section>

      <!-- losding spinner -->
      <section
        id="losdingSpinner"
        class="md:w-11/12 w-full mx-auto text-center hidden"
      >
        <span class="loading loading-spinner loading-xl"></span>
      </section>

      <!-- all cart container  -->
      <section
        id="cart-container"
        class="md:w-11/12 w-full mx-auto bg-base-100 p-4 flex flex-col gap-4 md:flex-row md:grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 md:gap-3 items-center"
      ></section>

      <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          <div id="detail-box" class="space-y-5"></div>
          <div class="modal-action">
            <form method="dialog">
              <!-- if there is a button in form, it will close the modal -->
              <button class="btn">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </section>

    <script src="./script/home.js"></script>
    <!-- <script src="./test.js"></script> -->
  </body>
</html>
