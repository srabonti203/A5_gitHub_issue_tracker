<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>
    <!-- font awsome links -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- daisy ui + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <section class="container-box w-full mx-auto p-5 bg-base-200 space-y-5">
      <!-- navbar start -->
      <nav class="flex items-center justify-between p-2 bg-base-100 shadow-sm">
        <div class="left-part flex items-center gap-3">
          <img class="w-10" src="./assets/github-logo.png" alt="" />
          <p class="font-bold text-2xl">GitHub Issue Tracker</p>
        </div>
        <div class="right-part">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search issues..." />
          </label>
        </div>
      </nav>

      <!-- buttons -->
      <section class="w-10/12 mx-auto bg-base-100 p-3 px-4 space-x-5">
        <button id="all-btn" class="btn btn-primary w-20">All</button>
        <button id="open-btn" class="btn btn-primary w-20">Open</button>
        <button id="closed-btn" class="btn btn-primary">Closed</button>
      </section>

      <!-- all count section  -->
      <section
        class="w-10/12 mx-auto bg-base-100 p-4 flex items-center justify-between"
      >
        <div class="flex items-center flex-initial gap-3">
          <div
            class="bg-blue-600/20 flex items-center justify-center w-12 h-12 rounded-full"
          >
            <img src="./assets/Aperture.png" alt="" />
          </div>
          <div>
            <p class="font-bold"><span>50</span> Issues</p>
            <p>Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="bg-green-600 w-3 h-3 rounded-full"></div>
          <p>Open</p>
          <div class="bg-purple-600 w-3 h-3 rounded-full"></div>
          <p>Closed</p>
        </div>
      </section>
    </section>
  </body>
</html>
