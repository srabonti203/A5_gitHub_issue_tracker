<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>
    <!-- font awsome links -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- daisy ui + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-base-200">
    <section
      class="w-8/12 h-screen mx-auto space-y-5 bg-base-100 shadow-sm flex flex-col justify-center items-center p-5"
    >
      <section
        class="upper space-y-2 flex flex-col justify-center items-center"
      >
        <img src="./assets/github-logo.png" alt="" />
        <h1 class="font-bold text-3xl text-center">GitHub Issues Tracker</h1>
        <p class="text-gray-600 text-lg text-center">
          Sign in to manage your issues
        </p>
      </section>

      <section class="middle space-y-2">
        <label class="label text-black font-medium">Username</label>
        <input
          id="username"
          type="text"
          class="input w-full"
          placeholder="Enter Username"
        /><br />
        <label class="label text-black font-medium">Password</label>
        <input
          id="password"
          type="password"
          class="input w-full"
          placeholder="Password"
        />
        <button id="signin-btn" class="btn btn-primary mt-4 w-full">
          Sign In
        </button>
      </section>

      <div class="hr_line flex items-center justify-center w-9/12 gap-3">
        <hr class="border-gray-300 flex-1 border-1" />
        <p class="text-gray-500">OR</p>
        <hr class="border-gray-300 flex-1 border-1" />
      </div>

      <div class="credientials space-y-3 w-9/12 text-center">
        <p class="text-gray-500">Demo Credentials:</p>
        <div class="demo bg-base-200 p-3 text-center">
          <p><span class="font-semibold">Username:</span> admin</p>
          <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
      </div>
    </section>
    <script src="./script/index.js"></script>
  </body>
</html>
